backend = "xrender";
vsync   = true;

# shadows
shadow            = true;
shadow-radius     = 12;
shadow-opacity    = 0.55;
shadow-offset-x   = -12;
shadow-offset-y   = -12;
shadow-color      = "#000000";
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Polybar'",
    "class_g = 'Conky'",
    "_GTK_FRAME_EXTENTS@:c"
];

# fading
fading           = true;
fade-in-step     = 0.05;
fade-out-step    = 0.05;
fade-delta       = 8;

# opacity
inactive-opacity = 0.95;
active-opacity   = 1.00;
frame-opacity    = 1.00;
inactive-opacity-override = false;

# corners (picom-next; harmless on older builds)
corner-radius = 6;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "class_g = 'Polybar'"
];

# misc
detect-rounded-corners = true;
detect-client-opacity  = true;
use-ewmh-active-win    = true;
detect-transient       = true;

wintypes:
{
    tooltip      = { fade = true; shadow = true; opacity = 0.92; focus = true; };
    dock         = { shadow = false; };
    dnd          = { shadow = false; };
    popup_menu   = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};
